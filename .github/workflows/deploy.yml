name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject Groq API key
        run: |
          ENCODED=$(printf '%s' '${{ secrets.GROQ_API_KEY }}' | base64 | tr -d '\n')
          sed -i "s|__GROQ_API_KEY__|$ENCODED|g" js/generate.js

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
